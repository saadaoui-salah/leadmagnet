name: Deploy Backend to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Authenticating git.."
            eval "$(ssh-agent -s)" && ssh-add ~/.ssh/git && ssh -T git@github.com

            cd ~/realestate-leadmagnet

            echo "Pulling latest..."
            git pull origin master

            echo "Installing deps..."
            source env/bin/activate || python3 -m venv env && source env/bin/activate
            pip install -r requirements.txt

            echo "Running migrations..."
            python manage.py migrate --noinput

            echo "Collecting static..."
            python manage.py collectstatic --noinput

            echo "Updating Gunicorn service..."
            sudo cp gunicorn.service /etc/systemd/system/gunicorn.service
            sudo systemctl daemon-reload

            echo "Restarting Gunicorn..."
            sudo systemctl restart gunicorn
            sleep 5

            echo "Checking /health endpoint..."
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:81/health/ > /dev/null 2>&1; then
                echo "Health check passed!"
                curl -s http://localhost:81/health/
                exit 0
              fi
              echo "Attempt $i failed, retrying in 3s..."
              sleep 3
            done

            echo "Health check failed after 5 attempts"
            sudo systemctl status gunicorn --no-pager
            exit 1
