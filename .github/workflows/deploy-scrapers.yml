name: Deploy Scrapers to Zyte

on:
  push:
    branches:
      - master
    paths:
      - "scrapers/**"
      - ".github/workflows/deploy-scrapers.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scrapers

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scrapers/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install shub
          pip install -r requirements.txt

      - name: Verify shub installation
        run: shub --version

      - name: Deploy to Zyte
        env:
          SHUB_APIKEY: ${{ secrets.SHUB_API_KEY }}
        run: |
          printf "Y\n" | shub deploy ${{ secrets.SHUB_PROJECT_ID }}