name: Deploy Scrappers to ZYTE

on:
  push:
    branches:
      - master
    paths:
      - "scrapers/**"
      - ".github/workflows/deploy-zyte.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install shub jq

      - name: Install scraper dependencies
        working-directory: scrapers
        run: |
          pip install -r requirements.txt

      - name: Deploy to all Zyte accounts
        working-directory: scrapers
        env:
          ZYTE_ACCOUNTS: ${{ secrets.ZYTE_ACCOUNTS }}
        run: |
          echo "$ZYTE_ACCOUNTS" | jq -c '.[]' | while read -r account; do
            export SHUB_APIKEY=$(echo "$account" | jq -r '.api_key')
            PROJECT_ID=$(echo "$account" | jq -r '.project_id')

            echo "Deploying to project $PROJECT_ID"

            shub deploy "$PROJECT_ID"
          done