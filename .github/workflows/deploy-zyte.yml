name: Deploy Scrappers to ZYTE

on:
  push:
    branches:
      - master
    paths:
      - "scrapers/**"
      - ".github/workflows/deploy-zyte.yml"
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      accounts: ${{ steps.accounts.outputs.accounts }}
    steps:
      - id: accounts
        run: echo "accounts=${{ secrets.ZYTE_ACCOUNTS }}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        account: ${{ fromJson(needs.prepare.outputs.accounts) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install shub

      - run: pip install -r requirements.txt
        working-directory: scrapers

      - name: Deploy
        working-directory: scrapers
        env:
          SHUB_APIKEY: ${{ matrix.account.api_key }}
        run: |
          shub deploy ${{ matrix.account.project_id }}