name: Setup Daily Crons

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'jobs/run_zyte.py'
      - '.github/workflows/setup-zyte-cron.yml'

jobs:
  setup-cron:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup cron job on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Authenticating git.."
            eval "$(ssh-agent -s)" && ssh-add ~/.ssh/git && ssh -T git@github.com

            cd ~/jobs/

            echo "Pulling latest..."
            git pull

            echo "Installing deps..."
            source venv/bin/activate || python3 -m venv ~/jobs/venv && source venv/bin/activate
            pip install -r requirements.txt

            echo "Setting up cron jobs..."
            SEARCH_CRON="0 2 * * * cd ~/jobs && . venv/bin/activate && python run_zyte.py --listing-types rent sold sale >> /var/log/zyte-cron.log 2>&1"
            DETAIL_CRON="30 2 * * * cd ~/jobs && . venv/bin/activate && python run_zyte.py --spider detail >> /var/log/zyte-detail-cron.log 2>&1"

            # Remove old entries, add new
            (crontab -l 2>/dev/null | grep -v "run_zyte.py"; echo "$SEARCH_CRON"; echo "$DETAIL_CRON") | crontab -

            echo "Cron jobs installed:"
            crontab -l | grep run_zyte

            echo "Done!"
