name: Setup Daily Crons

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'jobs/**'
      - '.github/workflows/setup-crons.yml'

jobs:
  setup-cron:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup cron job on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Authenticating git.."
            eval "$(ssh-agent -s)" && ssh-add ~/.ssh/git && ssh -T git@github.com

            cd ~/leadmagnet/jobs/

            echo "Pulling latest..."
            git pull

            echo "Installing deps..."
            source venv/bin/activate || python3 -m venv ~/leadmagnet/jobs/venv && source venv/bin/activate && pip install python-dotenv
            pip install -r requirements.txt

            echo "Setting up cron jobs..."
            SEARCH_CRON="0 2 * * * cd ~/leadmagnet/jobs && . venv/bin/activate && python run_zyte.py --listing-types rent sold sale >> ~/log/zyte-cron.log 2>&1"
            DETAIL_CRON="30 2 * * * cd ~/leadmagnet/jobs && . venv/bin/activate && python run_zyte.py --spider detail >> ~/log/zyte-detail-cron.log 2>&1"
            REPORT_CRON="0 9 * * * cd ~/leadmagnet/jobs && . venv/bin/activate && python zyte_report.py >> ~/log/zyte-report.log 2>&1"

            # Remove old entries, add new
            (crontab -l 2>/dev/null | grep -v "run_zyte.py" | grep -v "zyte_report.py"; echo "$SEARCH_CRON"; echo "$DETAIL_CRON"; echo "$REPORT_CRON") | crontab -

            echo "Cron jobs installed:"
            crontab -l | grep -E "run_zyte|zyte_report"

            echo "Done!"
